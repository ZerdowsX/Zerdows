<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ZerdowsArchive</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f5f5f5;
      text-align: center;
    }

    /* Баннер сайта */
    .top-banner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: linear-gradient(90deg, lime, #aaff00);
      color: black;
      font-size: 32px;
      font-weight: bold;
      padding: 15px 0;
      text-align: center;
      letter-spacing: 1px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      border-bottom: 3px solid #222;
      z-index: 1000;
    }

    .content {
      padding: 100px 20px 40px 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 20px;
    }

    p {
      font-size: 18px;
      margin-top: 0;
    }

    a {
      color: #0066cc;
      text-decoration: none;
      font-size: 18px;
    }

    a:hover {
      text-decoration: underline;
    }

    /* Карточки проектов */
    .cards-container {
      display: flex;
      justify-content: center; /* центрируем единственную карточку */
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      background-color: white;
      border: 1px solid #ccc;
      border-radius: 10px;
      width: 300px;
      padding: 20px;
      box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
      text-align: center;
      min-height: 250px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
      box-shadow: 4px 4px 15px rgba(0,0,0,0.2);
    }

    .card h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 16px;
      margin-bottom: 15px;
    }

    .card img {
      margin: 5px;
      width: 100px;
      height: auto;
    }

    .download-button {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 16px;
      color: white;
      background-color: #4d5257;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      transition: 0.2s;
    }

    .download-button:hover {
      background-color: #2f3337;
      transform: scale(1.05);
    }

    /* Реклама друга */
    .friend-ad {
      margin: 50px auto 50px auto;
      text-align: center;
      max-width: 400px;
    }

    .friend-ad img {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      border-radius: 8px;
    }

    .friend-ad p {
      margin-top: 8px;
      font-size: 16px;
    }

    .friend-ad a {
      color: inherit;
      text-decoration: none;
    }

    .friend-ad a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Баннер сайта -->
  <div class="top-banner">ZerdowsArchive</div>

  <div class="content">
    <p>Добро пожаловать на мой сайт, здесь выкладываются проекты и софт.</p>

    <h1>Проекты</h1>

    <div class="cards-container">

      <!-- Карточка 1 -->
      <div class="card">
        <h2>PotsikBrowser2K</h2>
        <p>Браузер на .NET Framework 2.0, старый движок, некоторые сайты открываются.</p>
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/09/Microsoft_Windows_2000_wordmark.svg/250px-Microsoft_Windows_2000_wordmark.svg.png" alt="Win2000">
        <img src="https://upload.wikimedia.org/wikipedia/ru/thumb/5/54/Microsoft_Windows_XP_Logo.svg/250px-Microsoft_Windows_XP_Logo.svg.png" alt="WinXP">
        <br>
        <a href="PotsikInternet2k.exe" download class="download-button">Скачать</a>
      </div>

    </div>

    <!-- Реклама друга -->
    <div class="friend-ad">
      <a href="https://zaxaraswerty.github.io/wap-portal/" target="_blank">
        <img src="https://zaxaraswerty.github.io/wap-portal/banner.gif" alt="zaxaraswerty">
      </a>
      <p>
        <a href="https://zaxaraswerty.github.io/wap-portal/" target="_blank">zaxaraswerty.github.io/wap-portal</a>
      </p>
    </div>

  </div>

</body>
</html>
