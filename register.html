<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Регистрация</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 2px 2px 15px rgba(0,0,0,0.2);
      text-align: center;
      width: 350px;
    }
    h1 { margin-bottom: 20px; }
    input {
      display: block;
      width: 80%;
      margin: 10px auto;
      padding: 10px;
      font-size: 16px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
    }
    .captcha {
      font-weight: bold;
      margin: 10px 0;
    }
    a { text-decoration: none; color: #0066cc; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="container">
  <h1>Регистрация</h1>
  <form id="registerForm">
    <input type="text" id="nickname" placeholder="Никнейм" required>
    <input type="email" id="email" placeholder="Email" required>
    <input type="password" id="password" placeholder="Пароль" required>
    <div class="captcha" id="captcha"></div>
    <input type="text" id="captchaInput" placeholder="Введите капчу" required>
    <button type="submit">Зарегистрироваться</button>
  </form>
  <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
</div>

<script>
  function generateCaptcha() {
    let chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
    let code = '';
    for (let i=0; i<5; i++) code += chars[Math.floor(Math.random()*chars.length)];
    return code;
  }
  let currentCaptcha = generateCaptcha();
  document.getElementById('captcha').innerText = 'Капча: ' + currentCaptcha;

  document.getElementById('registerForm').addEventListener('submit', function(e){
    e.preventDefault();
    let nickname = document.getElementById('nickname').value.trim();
    let email = document.getElementById('email').value.trim();
    let password = document.getElementById('password').value.trim();
    let captchaInput = document.getElementById('captchaInput').value.trim().toUpperCase();

    if(captchaInput !== currentCaptcha) {
      alert('Неверная капча!');
      currentCaptcha = generateCaptcha();
      document.getElementById('captcha').innerText = 'Капча: ' + currentCaptcha;
      return;
    }

    let users = JSON.parse(localStorage.getItem('users') || '[]');
    if(users.find(u => u.email === email)) {
      alert('Пользователь с таким email уже существует!');
      return;
    }

    users.push({nickname, email, password});
    localStorage.setItem('users', JSON.stringify(users));
    alert('Регистрация успешна! Войдите.');
    window.location.href = 'login.html';
  });
</script>

</body>
</html>
